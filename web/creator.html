<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>easyvideoweb</title>
  <link rel="stylesheet" href="/styles.css">
  <script src="/evw-lang.js"></script>
  <style>
    .creator-card {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      background: var(--bg-card);
      border-radius: 8px;
      border: 1px solid var(--border-color);
      box-shadow: var(--shadow-card);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .creator-form {
      display: grid;
      gap: 16px;
    }
    .creator-form .form-input {
      width: 100%;
    }
    .creator-actions {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .creator-submit {
      padding: 10px 22px;
      border-radius: 6px;
      background: var(--blue-color);
      color: #fff;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.2s;
    }
    .creator-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .creator-msg {
      font-size: 13px;
      color: var(--text-gray);
      min-height: 18px;
    }
    .creator-msg.error {
      color: #e53e3e;
    }
    .creator-msg.success {
      color: #38a169;
    }
    .creator-quota {
      font-size: 13px;
      color: var(--text-gray);
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div id="app" v-cloak>
    <div v-show="!langReady" class="app-loading"></div>
    <div v-show="langReady">
  <div class="app">
    <header class="boke-header">
      <div class="header-content">
        <div class="header-left">
          <a href="/" class="boke-logo">
            <svg viewBox="0 0 200 50" height="30" width="140" fill="#FB7299">
              <text x="0" y="35" font-family="Arial" font-weight="bold" font-size="28">EasyVideoWeb</text>
            </svg>
          </a>
          <nav class="header-nav">
            <a href="/" class="active">{{ t('common.header.videoHome') }}</a>
            <a href="/posts.html">{{ t('common.header.postHome') }}</a>
          </nav>
        </div>
        <div class="header-center">
          <div class="search-box">
            <input id="searchInput" type="text" :placeholder="t('common.header.searchPlaceholder')" />
            <button id="searchBtn">
              <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </button>
          </div>
        </div>
        <div class="header-right">
          <a href="/messages.html" class="msg-icon-link" id="msgIconLink" :title="t('common.header.messageCenter')">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#FB7299" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            <span class="header-msg-badge" id="headerMsgBadge"></span>
          </a>
          <div class="user-entry" id="userEntry">
            <div class="avatar-placeholder"></div>
          </div>
          <button class="upload-btn" id="uploadBtn">{{ t('common.header.upload') }}</button>
          <button class="upload-btn" id="postUploadBtn">{{ t('common.header.postUpload') }}</button>
        </div>
      </div>
      <div class="header-banner-bg"></div>
    </header>
    <main class="boke-main">
      <section class="creator-card">
        <div class="section-title">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="#FB7299"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
          <div>
            <h2>{{ t('creator.pageTitle') }}</h2>
            <div id="videoPublishQuota" class="creator-quota">{{ t('creator.quotaRemain') }}--</div>
          </div>
        </div>
        <div class="creator-form">
          <div class="form-group">
            <label class="form-label" for="categorySelect">{{ t('creator.selectCategory') }}</label>
            <select id="categorySelect" class="form-input"></select>
          </div>
          <div class="form-group">
            <label class="form-label" for="descInput">{{ t('creator.videoDesc') }}</label>
            <textarea id="descInput" class="form-input" rows="4" :placeholder="t('creator.videoDescPlaceholder')"></textarea>
          </div>
          <div class="form-group">
            <label class="form-label" for="videoFile">{{ t('creator.uploadVideoFile') }}</label>
            <input id="videoFile" class="form-input" type="file" accept=".mp4,.mov,.mkv,.webm">
          </div>
        </div>
        <div class="creator-actions">
          <button id="uploadSubmitBtn" class="creator-submit">{{ t('creator.uploadVideo') }}</button>
          <div id="creatorMsg" class="creator-msg"></div>
        </div>
      </section>
    </main>
  </div>
    </div>
  </div>
  <style>[v-cloak]{display:none!important}.app-loading{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f4f5f7}.app-loading::after{content:'';width:32px;height:32px;border:3px solid #e0e0e0;border-top-color:#00AEEC;border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}</style>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script>
  (function(){const {createApp,ref,onMounted}=Vue;const lang=ref({});const langReady=ref(false);
  function t(k){let v=lang.value;k.split('.').forEach(x=>{v=v!=null?v[x]:undefined});return v!=null?String(v):k;}
  createApp({setup(){onMounted(async ()=>{if(window.evwLangPromise)await window.evwLangPromise;lang.value=window.evwLang||{};langReady.value=true;if(lang.value.creator&&lang.value.creator.pageTitle)document.title='easyvideoweb - '+lang.value.creator.pageTitle;});return{t,langReady}}}).mount('#app');})();
  </script>
  <script>
    const getLoginRedirectUrl = (target) => {
      const redirectTarget = target || (window.location.pathname + window.location.search);
      return `/?login=1&redirect=${encodeURIComponent(redirectTarget)}`;
    };
    const token = localStorage.getItem('authToken');
    if (!token) {
      window.location.href = getLoginRedirectUrl();
    }

    if (token) {
      fetch('/api/messages/unread-count', { headers: { Authorization: 'Bearer ' + token } })
        .then((r) => (r.ok ? r.json() : null))
        .then((d) => {
          if (!d) return;
          const badge = document.getElementById('headerMsgBadge');
          if (badge && d.count > 0) {
            badge.textContent = d.count > 99 ? '99+' : d.count;
            badge.style.display = 'flex';
          }
        }).catch(() => {});
    }

    const headerUserEntry = document.getElementById('userEntry');
    const headerAvatar = headerUserEntry ? headerUserEntry.querySelector('.avatar-placeholder') : null;
    const headerUploadBtn = document.getElementById('uploadBtn');
    const headerPostUploadBtn = document.getElementById('postUploadBtn');
    const categorySelect = document.getElementById('categorySelect');
    const descInput = document.getElementById('descInput');
    const videoFile = document.getElementById('videoFile');
    const uploadSubmitBtn = document.getElementById('uploadSubmitBtn');
    const creatorMsg = document.getElementById('creatorMsg');
    const videoPublishQuota = document.getElementById('videoPublishQuota');

    const guestAvatarSvg = `data:image/svg+xml;utf8,${encodeURIComponent(
      "<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><circle cx='32' cy='32' r='32' fill='%23E3E5E7'/><circle cx='32' cy='24' r='10' fill='%239499A0'/><path d='M12 54c4-10 16-14 20-14s16 4 20 14' fill='%239499A0'/></svg>"
    )}`;

    const applyHeaderAvatar = (user) => {
      if (!headerAvatar) return;
      if (user && user.avatarUrl) {
        headerAvatar.textContent = '';
        headerAvatar.style.backgroundImage = `url(${user.avatarUrl})`;
        headerAvatar.style.backgroundSize = 'cover';
        headerAvatar.style.backgroundPosition = 'center';
        headerAvatar.style.backgroundRepeat = 'no-repeat';
        headerAvatar.style.backgroundColor = 'transparent';
        return;
      }
      const nickname = user && user.nickname ? user.nickname : 'U';
      headerAvatar.textContent = nickname ? nickname[0].toUpperCase() : 'U';
      headerAvatar.style.background = '#00AEEC';
      headerAvatar.style.color = '#fff';
      headerAvatar.style.backgroundImage = 'none';
    };

    const applyHeaderLoggedOut = () => {
      if (!headerAvatar) return;
      headerAvatar.textContent = '';
      headerAvatar.style.background = '#E3E5E7';
      headerAvatar.style.color = '#9499A0';
      headerAvatar.style.backgroundImage = `url("${guestAvatarSvg}")`;
      headerAvatar.style.backgroundSize = '70%';
      headerAvatar.style.backgroundPosition = 'center';
      headerAvatar.style.backgroundRepeat = 'no-repeat';
    };

    if (headerUserEntry) {
      headerUserEntry.addEventListener('click', () => {
        if (token) {
          window.location.href = '/user.html';
          return;
        }
        window.location.href = getLoginRedirectUrl();
      });
    }

    if (headerUploadBtn) {
      headerUploadBtn.addEventListener('click', () => {
        if (token) {
          window.location.href = '/creator.html';
          return;
        }
        window.location.href = getLoginRedirectUrl('/creator.html');
      });
    }
    if (headerPostUploadBtn) {
      headerPostUploadBtn.addEventListener('click', () => {
        if (token) {
          window.location.href = '/post_create.html';
          return;
        }
        window.location.href = getLoginRedirectUrl('/post_create.html');
      });
    }

    if (token) {
      const userStr = localStorage.getItem('user');
      if (userStr) {
        try {
          applyHeaderAvatar(JSON.parse(userStr));
        } catch (e) {
          localStorage.removeItem('user');
          applyHeaderAvatar({ nickname: 'U' });
        }
      } else {
        applyHeaderAvatar({ nickname: 'U' });
      }
    } else {
      applyHeaderLoggedOut();
    }

    const setMsg = (text, type = '') => {
      creatorMsg.textContent = text;
      creatorMsg.className = `creator-msg ${type}`;
    };

    const authFetch = (url, options = {}) => {
      const headers = options.headers || {};
      headers.Authorization = `Bearer ${token}`;
      return fetch(url, { ...options, headers });
    };

    const loadPublishQuota = async () => {
      if (!videoPublishQuota) return;
      try {
        const res = await authFetch('/api/creator/publish-quota');
        if (!res.ok) throw new Error('failed to load quota');
        const data = await res.json();
        const remaining = typeof data.videoRemaining === 'number' ? data.videoRemaining : '--';
        const likesPerBonus = typeof data.likesPerBonus === 'number' ? data.likesPerBonus : 20;
        const fmt = (window.evwT && window.evwT('creator.quotaFormat')) || '剩余发布次数：{remaining}（每{likesPerBonus}赞+1次）';
        videoPublishQuota.textContent = fmt.replace(/\{remaining\}/g, String(remaining)).replace(/\{likesPerBonus\}/g, String(likesPerBonus));
      } catch (e) {
        videoPublishQuota.textContent = (window.evwT && window.evwT('creator.quotaUnknown')) || '剩余发布次数：--';
      }
    };

    const loadCategories = async () => {
      const res = await fetch('/api/categories');
      const list = await res.json();
      const categories = list.filter((item) => item.id !== 'all');
      categorySelect.innerHTML = '';
      if (categories.length === 0) {
        setMsg('暂无可选分区，请联系管理员添加', 'error');
        uploadSubmitBtn.disabled = true;
        return;
      }
      categories.forEach((item) => {
        const option = document.createElement('option');
        option.value = item.id;
        option.textContent = item.name;
        categorySelect.appendChild(option);
      });
      uploadSubmitBtn.disabled = false;
    };

    uploadSubmitBtn.addEventListener('click', async () => {
      const category = categorySelect.value;
      const description = descInput.value.trim();
      const file = videoFile.files[0];
      if (!category) {
        setMsg('请选择分区', 'error');
        return;
      }
      if (!file) {
        setMsg('请选择视频文件', 'error');
        return;
      }
      const form = new FormData();
      form.append('category', category);
      if (description) {
        form.append('description', description);
      }
      form.append('file', file);
      uploadSubmitBtn.disabled = true;
      setMsg('上传中...');
      try {
        const res = await authFetch('/api/creator/upload', {
          method: 'POST',
          body: form
        });
        if (res.status === 401) {
          localStorage.removeItem('authToken');
          window.location.href = getLoginRedirectUrl();
          return;
        }
        if (!res.ok) {
          throw new Error(await res.text());
        }
        const data = await res.json();
        if (data.review === 'pending') {
          setMsg('上传成功！视频正在审核中，审核通过后将在首页展示。审核结果会通过消息通知您。', 'success');
        } else {
          setMsg('上传成功', 'success');
        }
        videoFile.value = '';
        loadPublishQuota();
      } catch (err) {
        setMsg(err.message || '上传失败', 'error');
      } finally {
        uploadSubmitBtn.disabled = false;
      }
    });

    loadCategories();
    loadPublishQuota();
  </script>
</body>
</html>
